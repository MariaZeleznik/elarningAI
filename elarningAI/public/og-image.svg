<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2E4B"/>
      <stop offset="100%" stop-color="#0a1a2d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5A0"/>
      <stop offset="100%" stop-color="#06d6d0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative grid lines -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Neural network decoration (right side) -->
  <g opacity="0.25">
    <!-- Nodes -->
    <circle cx="820" cy="120" r="8" fill="#0EA5A0"/>
    <circle cx="900" cy="180" r="6" fill="#0EA5A0"/>
    <circle cx="980" cy="140" r="10" fill="#0EA5A0"/>
    <circle cx="1060" cy="200" r="7" fill="#0EA5A0"/>
    <circle cx="860" cy="270" r="9" fill="#F59E0B"/>
    <circle cx="950" cy="310" r="6" fill="#0EA5A0"/>
    <circle cx="1040" cy="280" r="8" fill="#0EA5A0"/>
    <circle cx="820" cy="360" r="7" fill="#0EA5A0"/>
    <circle cx="920" cy="400" r="11" fill="#F59E0B"/>
    <circle cx="1010" cy="370" r="6" fill="#0EA5A0"/>
    <circle cx="1080" cy="420" r="8" fill="#0EA5A0"/>
    <circle cx="870" cy="480" r="7" fill="#0EA5A0"/>
    <circle cx="960" cy="510" r="9" fill="#0EA5A0"/>
    <circle cx="1050" cy="475" r="6" fill="#F59E0B"/>
    <!-- Connections -->
    <line x1="820" y1="120" x2="900" y2="180" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="900" y1="180" x2="980" y2="140" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="980" y1="140" x2="1060" y2="200" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="900" y1="180" x2="860" y2="270" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="980" y1="140" x2="950" y2="310" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="1060" y1="200" x2="1040" y2="280" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="860" y1="270" x2="820" y2="360" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="860" y1="270" x2="950" y2="310" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="950" y1="310" x2="1040" y2="280" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="820" y1="360" x2="920" y2="400" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="950" y1="310" x2="920" y2="400" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="1040" y1="280" x2="1010" y2="370" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="1010" y1="370" x2="1080" y2="420" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="920" y1="400" x2="870" y2="480" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="920" y1="400" x2="960" y2="510" stroke="#0EA5A0" stroke-width="1.5"/>
    <line x1="1010" y1="370" x2="1050" y2="475" stroke="#0EA5A0" stroke-width="1.5"/>
  </g>

  <!-- Teal accent bar -->
  <rect x="80" y="200" width="6" height="120" rx="3" fill="url(#accentGrad)"/>

  <!-- Logo / Brand name -->
  <text x="110" y="160" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#0EA5A0" letter-spacing="2">NEUROVA</text>
  <text x="110" y="195" font-family="system-ui, sans-serif" font-size="18" font-weight="400" fill="#64748b" letter-spacing="4">AI ACADEMY</text>

  <!-- Main headline -->
  <text x="110" y="270" font-family="system-ui, sans-serif" font-size="58" font-weight="800" fill="#ffffff">Kursy AI i Analityki</text>
  <text x="110" y="340" font-family="system-ui, sans-serif" font-size="58" font-weight="800" fill="#ffffff">Danych <tspan fill="#F59E0B">po Polsku</tspan></text>

  <!-- Subtext -->
  <text x="112" y="400" font-family="system-ui, sans-serif" font-size="26" fill="#94a3b8">Darmowe materialy. Certyfikat potwierdzony egzaminem.</text>

  <!-- Tags -->
  <rect x="110" y="440" width="130" height="40" rx="20" fill="#0EA5A0" opacity="0.15"/>
  <text x="175" y="466" font-family="system-ui, sans-serif" font-size="18" fill="#0EA5A0" text-anchor="middle">AI / ML</text>

  <rect x="260" y="440" width="175" height="40" rx="20" fill="#F59E0B" opacity="0.15"/>
  <text x="347" y="466" font-family="system-ui, sans-serif" font-size="18" fill="#F59E0B" text-anchor="middle">Analityka Danych</text>

  <rect x="455" y="440" width="130" height="40" rx="20" fill="#64748b" opacity="0.2"/>
  <text x="520" y="466" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Certyfikat</text>

  <!-- URL -->
  <text x="110" y="560" font-family="system-ui, sans-serif" font-size="20" fill="#475569">neurova.pl</text>
</svg>
