<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="c1"><circle cx="100" cy="100" r="100"/></clipPath>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B6CA8"/>
      <stop offset="100%" stop-color="#0f3050"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg1)"/>
  <!-- Shoulders / blazer -->
  <path d="M5 200 Q30 152 100 148 Q170 152 195 200Z" fill="#0a2540" clip-path="url(#c1)"/>
  <!-- Collar / shirt -->
  <path d="M86 138 Q100 148 114 138 L108 125 Q100 132 92 125Z" fill="#ffffff" opacity="0.9"/>
  <!-- Neck -->
  <rect x="90" y="118" width="20" height="24" rx="5" fill="#c8956c"/>
  <!-- Head shape -->
  <ellipse cx="100" cy="95" rx="30" ry="34" fill="#c8956c"/>
  <!-- Hair (shoulder-length with part) -->
  <path d="M70 85 Q70 52 100 48 Q130 52 130 85 Q128 58 100 56 Q72 58 70 85Z" fill="#1a0f08"/>
  <path d="M70 88 Q67 112 69 132 L76 130 Q74 112 74 95Z" fill="#1a0f08"/>
  <path d="M130 88 Q133 112 131 132 L124 130 Q126 112 126 95Z" fill="#1a0f08"/>
  <!-- Ear -->
  <ellipse cx="70" cy="98" rx="5" ry="7" fill="#c8956c"/>
  <ellipse cx="130" cy="98" rx="5" ry="7" fill="#c8956c"/>
  <!-- Eyes -->
  <ellipse cx="89" cy="94" rx="4.5" ry="3.5" fill="#1a0f08"/>
  <ellipse cx="111" cy="94" rx="4.5" ry="3.5" fill="#1a0f08"/>
  <!-- Eye whites -->
  <ellipse cx="90" cy="93" rx="1.5" ry="1.5" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="112" cy="93" rx="1.5" ry="1.5" fill="#ffffff" opacity="0.6"/>
  <!-- Eyebrows -->
  <path d="M83 87 Q89 84 95 87" stroke="#1a0f08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M105 87 Q111 84 117 87" stroke="#1a0f08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M98 100 Q100 106 102 100" stroke="#a06040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Lips -->
  <path d="M90 112 Q100 117 110 112" stroke="#b05040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M90 112 Q95 110 100 112 Q105 110 110 112" stroke="#c06050" stroke-width="1.5" fill="none"/>
</svg>
