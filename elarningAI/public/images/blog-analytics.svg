<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgAn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2a40"/>
      <stop offset="100%" stop-color="#0a1a2d"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bgAn)"/>

  <!-- Grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.4">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>

  <!-- Chart visualization (right side) -->
  <g transform="translate(420, 40)">
    <!-- Chart background panel -->
    <rect width="330" height="300" rx="12" fill="#0f1f30" opacity="0.85"/>

    <!-- Chart title bar -->
    <rect width="330" height="36" rx="12" fill="#1e3a5f" opacity="0.8"/>
    <text x="16" y="24" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Sprzedaz miesięczna 2024</text>

    <!-- Y axis line -->
    <line x1="50" y1="50" x2="50" y2="240" stroke="#334155" stroke-width="1.5"/>
    <!-- X axis line -->
    <line x1="50" y1="240" x2="310" y2="240" stroke="#334155" stroke-width="1.5"/>

    <!-- Y axis labels -->
    <text x="42" y="240" font-family="monospace" font-size="9" fill="#475569" text-anchor="end">0</text>
    <text x="42" y="192" font-family="monospace" font-size="9" fill="#475569" text-anchor="end">25k</text>
    <text x="42" y="144" font-family="monospace" font-size="9" fill="#475569" text-anchor="end">50k</text>
    <text x="42" y="96" font-family="monospace" font-size="9" fill="#475569" text-anchor="end">75k</text>

    <!-- Horizontal grid lines -->
    <line x1="50" y1="192" x2="310" y2="192" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="50" y1="144" x2="310" y2="144" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="50" y1="96" x2="310" y2="96" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- Line chart path (revenue trend) -->
    <polyline
      points="70,210 90,195 110,185 130,170 150,178 170,155 190,140 210,130 230,118 250,105 270,98 290,88"
      fill="none" stroke="#0EA5A0" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Area fill -->
    <polygon
      points="70,210 90,195 110,185 130,170 150,178 170,155 190,140 210,130 230,118 250,105 270,98 290,88 290,240 70,240"
      fill="#0EA5A0" opacity="0.08"/>
    <!-- Data points -->
    <circle cx="70" cy="210" r="4" fill="#0EA5A0"/>
    <circle cx="110" cy="185" r="4" fill="#0EA5A0"/>
    <circle cx="150" cy="178" r="4" fill="#0EA5A0"/>
    <circle cx="190" cy="140" r="4" fill="#0EA5A0"/>
    <circle cx="230" cy="118" r="4" fill="#0EA5A0"/>
    <circle cx="270" cy="98" r="5" fill="#f59e0b" opacity="0.9"/>
    <circle cx="290" cy="88" r="5" fill="#f59e0b"/>

    <!-- Second line (target) -->
    <polyline
      points="70,200 130,180 190,160 250,145 290,135"
      fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>

    <!-- X axis labels -->
    <text x="70" y="256" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Sty</text>
    <text x="110" y="256" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Lut</text>
    <text x="150" y="256" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Mar</text>
    <text x="190" y="256" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Kwi</text>
    <text x="230" y="256" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Maj</text>
    <text x="270" y="256" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Cze</text>
    <text x="290" y="256" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">Lip</text>

    <!-- Legend -->
    <line x1="56" y1="278" x2="76" y2="278" stroke="#0EA5A0" stroke-width="2.5"/>
    <circle cx="66" cy="278" r="3" fill="#0EA5A0"/>
    <text x="82" y="282" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Przychod</text>

    <line x1="150" y1="278" x2="170" y2="278" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="176" y="282" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Plan</text>
  </g>

  <!-- Title text (left) -->
  <text x="60" y="80" font-family="system-ui, sans-serif" font-size="46" font-weight="800" fill="#ffffff" opacity="0.95">Analityka</text>
  <text x="60" y="138" font-family="system-ui, sans-serif" font-size="46" font-weight="800" fill="#0EA5A0">Danych</text>
  <text x="60" y="185" font-family="system-ui, sans-serif" font-size="21" fill="#64748b">Blog Neurova AI Academy</text>

  <!-- SQL / Python badges -->
  <rect x="60" y="212" width="65" height="28" rx="14" fill="#0EA5A0" opacity="0.18"/>
  <text x="92" y="231" font-family="system-ui, sans-serif" font-size="12" fill="#0EA5A0" text-anchor="middle">SQL</text>

  <rect x="140" y="212" width="80" height="28" rx="14" fill="#f59e0b" opacity="0.15"/>
  <text x="180" y="231" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">Python</text>

  <rect x="235" y="212" width="90" height="28" rx="14" fill="#7c3aed" opacity="0.15"/>
  <text x="280" y="231" font-family="system-ui, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">Power BI</text>

  <!-- Stats mini cards -->
  <rect x="60" y="260" width="130" height="70" rx="10" fill="#0f1f30" opacity="0.9"/>
  <text x="125" y="290" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#0EA5A0" text-anchor="middle">+42%</text>
  <text x="125" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">wzrost YoY</text>

  <rect x="210" y="260" width="130" height="70" rx="10" fill="#0f1f30" opacity="0.9"/>
  <text x="275" y="290" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#f59e0b" text-anchor="middle">1.2M</text>
  <text x="275" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">rekordow</text>
</svg>
