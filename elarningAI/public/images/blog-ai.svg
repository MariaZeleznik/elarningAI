<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgAI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2E4B"/>
      <stop offset="100%" stop-color="#0a1a2d"/>
    </linearGradient>
    <filter id="glowAI">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgAI)"/>

  <!-- Grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.4">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>

  <!-- Brain outline (stylized) -->
  <g transform="translate(290, 60)" opacity="0.9">
    <!-- Left hemisphere -->
    <path d="M110 140 Q90 130 75 110 Q50 85 55 60 Q60 35 85 25 Q110 15 125 35 Q140 15 165 25 Q190 35 195 60 Q200 85 175 110 Q160 130 140 140 Z"
          fill="none" stroke="#0EA5A0" stroke-width="2.5"/>
    <!-- Brain folds (left) -->
    <path d="M85 55 Q95 70 90 85 Q85 100 95 110" stroke="#0EA5A0" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M100 45 Q110 65 105 80" stroke="#0EA5A0" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Brain folds (right) -->
    <path d="M155 55 Q145 70 150 85 Q155 100 145 110" stroke="#0EA5A0" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M140 45 Q130 65 135 80" stroke="#0EA5A0" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Center line -->
    <line x1="125" y1="30" x2="125" y2="140" stroke="#0EA5A0" stroke-width="1" opacity="0.5" stroke-dasharray="4 3"/>

    <!-- Circuit nodes emanating from brain -->
    <!-- Left connections -->
    <circle cx="55" cy="60" r="4" fill="#0EA5A0" filter="url(#glowAI)"/>
    <circle cx="35" cy="45" r="3" fill="#0EA5A0" opacity="0.7"/>
    <circle cx="20" cy="70" r="3.5" fill="#7c3aed" opacity="0.7"/>
    <circle cx="40" cy="90" r="3" fill="#0EA5A0" opacity="0.6"/>
    <line x1="55" y1="60" x2="35" y2="45" stroke="#0EA5A0" stroke-width="1.5" opacity="0.5"/>
    <line x1="35" y1="45" x2="20" y2="70" stroke="#0EA5A0" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="70" x2="40" y2="90" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
    <line x1="55" y1="60" x2="40" y2="90" stroke="#0EA5A0" stroke-width="1" opacity="0.4"/>

    <!-- Right connections -->
    <circle cx="195" cy="60" r="4" fill="#0EA5A0" filter="url(#glowAI)"/>
    <circle cx="215" cy="45" r="3" fill="#f59e0b" opacity="0.7"/>
    <circle cx="230" cy="70" r="3.5" fill="#0EA5A0" opacity="0.7"/>
    <circle cx="210" cy="95" r="3" fill="#7c3aed" opacity="0.6"/>
    <line x1="195" y1="60" x2="215" y2="45" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="215" y1="45" x2="230" y2="70" stroke="#0EA5A0" stroke-width="1.5" opacity="0.5"/>
    <line x1="230" y1="70" x2="210" y2="95" stroke="#0EA5A0" stroke-width="1.5" opacity="0.5"/>

    <!-- Bottom connections -->
    <circle cx="125" cy="145" r="4" fill="#0EA5A0" filter="url(#glowAI)"/>
    <circle cx="95" cy="165" r="3" fill="#0EA5A0" opacity="0.7"/>
    <circle cx="155" cy="165" r="3" fill="#f59e0b" opacity="0.7"/>
    <circle cx="125" cy="185" r="3.5" fill="#0EA5A0" opacity="0.6"/>
    <line x1="125" y1="145" x2="95" y2="165" stroke="#0EA5A0" stroke-width="1.5" opacity="0.5"/>
    <line x1="125" y1="145" x2="155" y2="165" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="95" y1="165" x2="125" y2="185" stroke="#0EA5A0" stroke-width="1.5" opacity="0.5"/>
    <line x1="155" y1="165" x2="125" y2="185" stroke="#0EA5A0" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Title text -->
  <text x="60" y="80" font-family="system-ui, sans-serif" font-size="48" font-weight="800" fill="#ffffff" opacity="0.95">Sztuczna</text>
  <text x="60" y="140" font-family="system-ui, sans-serif" font-size="48" font-weight="800" fill="#0EA5A0">Inteligencja</text>
  <text x="60" y="190" font-family="system-ui, sans-serif" font-size="22" fill="#64748b">Blog Neurova AI Academy</text>

  <!-- Decorative chips/badges -->
  <rect x="60" y="215" width="80" height="30" rx="15" fill="#7c3aed" opacity="0.2"/>
  <text x="100" y="234" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">LLM</text>

  <rect x="155" y="215" width="90" height="30" rx="15" fill="#0EA5A0" opacity="0.15"/>
  <text x="200" y="234" font-family="system-ui, sans-serif" font-size="13" fill="#0EA5A0" text-anchor="middle">ML / AI</text>

  <rect x="260" y="215" width="110" height="30" rx="15" fill="#f59e0b" opacity="0.15"/>
  <text x="315" y="234" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">Deep Learning</text>
</svg>
